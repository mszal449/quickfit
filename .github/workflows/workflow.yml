name: Build and test

on: push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository_owner }}/quickfit-api
  IMAGE_NAME_FRONTEND: ${{ github.repository_owner }}/quickfit-frontend

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: api
        run: uv sync --frozen

      - name: ruff check
        working-directory: api
        run: uv run ruff check .

      - name: ruff format --check
        working-directory: api
        run: uv run ruff format --check .

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: eslint
        working-directory: frontend
        run: npm run lint

  build-test-image:
    needs: [lint-backend, lint-frontend]
    runs-on: ubuntu-latest
    outputs:
      api-test-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:test-${{ github.sha }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API (test target)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          target: test
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build-test-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        test-type: [unit, integration]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ${{ matrix.test-type }} tests
        working-directory: api
        env:
          API_IMAGE: ${{ needs.build-test-image.outputs.api-test-image }}
        run: docker compose -f compose.test.yaml run --rm ${{ matrix.test-type }}-tests

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API (runtime)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          target: runtime
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME_API, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME_FRONTEND, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [test, build-push]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Apply prod secrets
        run: |
          kubectl create secret generic postgres-secret \
            --from-literal=POSTGRES_USER="${{ secrets.PROD_POSTGRES_USER }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.PROD_POSTGRES_PASSWORD }}" \
            --from-literal=POSTGRES_DB="${{ secrets.PROD_POSTGRES_DB }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic backend-secret \
            --from-literal=DB_URL="postgresql+asyncpg://${{ secrets.PROD_POSTGRES_USER }}:${{ secrets.PROD_POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.PROD_POSTGRES_DB }}" \
            --from-literal=JWT_SECRET="${{ secrets.PROD_JWT_SECRET }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.PROD_GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}" \
            --from-literal=GOOGLE_REDIRECT_URI="${{ secrets.PROD_GOOGLE_REDIRECT_URI }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure infrastructure exists
        working-directory: k8s/overlays/prod
        run: kubectl apply -k .

      - name: Run migrations
        run: |
          SAFE_TAG=$(echo "${TAG}" | tr '.' '-')
          kubectl delete job migrate-${SAFE_TAG} --ignore-not-found
          kubectl create job migrate-${SAFE_TAG} --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${TAG} -- sh -c "cd /app && alembic upgrade head"
          kubectl wait --for=condition=complete job/migrate-${SAFE_TAG} --timeout=120s

      - name: Deploy images
        working-directory: k8s/overlays/prod
        run: |
          kustomize edit set image \
            quickfit-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${TAG} \
            quickfit-frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${TAG}
          kubectl apply -k .

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
