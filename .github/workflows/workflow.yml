name: Build and test

on: push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository_owner }}/quickfit-api
  IMAGE_NAME_FRONTEND: ${{ github.repository_owner }}/quickfit-frontend

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: api
        run: uv sync --frozen

      - name: ruff check
        working-directory: api
        run: uv run ruff check .

      - name: ruff format --check
        working-directory: api
        run: uv run ruff format --check .

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: eslint
        working-directory: frontend
        run: npm run lint

  build-test-image:
    needs: [lint-backend, lint-frontend]
    runs-on: ubuntu-latest
    outputs:
      api-test-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:test-${{ github.sha }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API (test target)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          target: test
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build-test-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        test-type: [unit, integration]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ${{ matrix.test-type }} tests
        working-directory: api
        env:
          API_IMAGE: ${{ needs.build-test-image.outputs.api-test-image }}
        run: docker compose -f compose.test.yaml run --rm ${{ matrix.test-type }}-tests

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API (runtime)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          target: runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
