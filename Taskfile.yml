version: "3"

tasks:
  dev:
    desc: "Start backend + frontend locally"
    deps: [dev:backend, dev:frontend]

  dev:backend:
    desc: "Start backend locally"
    dir: "api/src"
    cmd: uv run python run.py

  dev:frontend:
    desc: "Start frontend locally"
    dir: "frontend"
    cmd: npm run dev

  # -------------- LINT / FORMAT --------------
  lint:
    desc: "Lint backend (ruff) + frontend (eslint)"
    deps: [lint:api, lint:frontend]

  lint:api:
    dir: "api"
    cmd: uv run ruff check . --fix

  lint:frontend:
    dir: "frontend"
    cmd: npm run lint

  format:
    desc: "Format backend (ruff) + frontend (prettier)"
    deps: [format:api, format:frontend]

  format:api:
    dir: "api"
    cmd: uv run ruff format .

  format:frontend:
    dir: "frontend"
    cmd: npx prettier --write .

  # -------------- FRONTEND -------------
  gen-api:
    desc: "Generate TanStack Query hooks from backend OpenAPI schema (backend must be running)"
    dir: "frontend"
    cmd: npx orval

  # -------------- BACKEND --------------

  test-unit-backend:
    desc: "Runs pytest unit tests for backend"
    dir: "api"
    cmd: docker compose -f compose.test.yaml run --build --rm unit-tests

  test-integration-backend:
    desc: "Run backend integration tests against real Postgres in Docker"
    dir: "api"
    cmds:
      - docker compose -f compose.test.yaml down -v
      - docker compose -f compose.test.yaml run --rm --build integration-tests
      - docker compose -f compose.test.yaml down -v

  test-backend:
    desc: "Run unit + integration tests in Docker"
    deps: [test-unit-backend, test-integration-backend]

  add-migration:
    desc: "Creates alembic migration of a given name"
    dir: "api"
    requires:
      vars: [NAME]
    cmd: uv run alembic revision --autogenerate -m "{{.NAME}}"

  migrate:
    desc: "Executes migration on a specified database"
    dir: "api"
    cmd: uv run alembic upgrade head

  k8s-local:
    desc: "Apply k8s manifests to the local minikube cluster"
    cmd: kubectl apply -k k8s/overlays/local

  build-local:
    desc: "Build api+frontend images (tagged :latest and with the commit SHA) and load into minikube. Requires a clean working tree."
    vars:
      TAG:
        sh: git rev-parse --short HEAD
    preconditions:
      - sh: '[ -z "$(git status --porcelain)" ]'
        msg: "Working tree has uncommitted changes — commit before running build-local/redeploy-local"
    cmds:
      - docker build -t quickfit-api:latest -t quickfit-api:{{.TAG}} --target runtime ./api
      - docker build -t quickfit-frontend:latest -t quickfit-frontend:{{.TAG}} ./frontend
      - minikube image load quickfit-api:latest
      - minikube image load quickfit-api:{{.TAG}}
      - minikube image load quickfit-frontend:latest
      - minikube image load quickfit-frontend:{{.TAG}}
      - echo "{{.TAG}}" > .local-image-tag

  redeploy-local:
    desc: "Build, load, and roll out backend+frontend on minikube with a fresh unique image tag"
    cmds:
      - task: build-local
      - kubectl set image deployment/backend backend=quickfit-api:$(cat .local-image-tag)
      - kubectl set image deployment/frontend frontend=quickfit-frontend:$(cat .local-image-tag)
      - kubectl rollout status deployment/backend
      - kubectl rollout status deployment/frontend

  secrets-local:
    desc: "Create/update k8s secrets on the current cluster context from .env.k8s.local"
    dotenv: [".env.k8s.local"]
    cmds:
      - >
        kubectl create secret generic postgres-secret
        --from-literal=POSTGRES_USER=$POSTGRES_USER
        --from-literal=POSTGRES_PASSWORD=$POSTGRES_PASSWORD
        --from-literal=POSTGRES_DB=$POSTGRES_DB
        --dry-run=client -o yaml | kubectl apply -f -
      - >
        kubectl create secret generic backend-secret
        --from-literal=DB_URL=postgresql+asyncpg://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB
        --from-literal=JWT_SECRET=$JWT_SECRET
        --from-literal=GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
        --from-literal=GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
        --from-literal=GOOGLE_REDIRECT_URI=$GOOGLE_REDIRECT_URI
        --from-literal=GOOGLE_HEALTH_REDIRECT_URI=$GOOGLE_HEALTH_REDIRECT_URI
        --from-literal=INTEGRATION_SECRET=$INTEGRATION_SECRET
        --dry-run=client -o yaml | kubectl apply -f -
